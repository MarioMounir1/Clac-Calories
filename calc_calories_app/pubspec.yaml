name: calc_calories
description: Calc-Calories — AI-powered calorie counter for Egyptian restaurants

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Local Storage / Offline Cache
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Image Picker
  image_picker: ^1.1.2

  # Navigation
  go_router: ^14.6.1

  # UI & Fonts
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  cached_network_image: ^3.4.1

  # Functional Programming
  dartz: ^0.10.1

  # Utils
  intl: ^0.20.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
